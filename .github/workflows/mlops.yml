name: MLOps Pipeline

on:
  push:
    branches: [master]

    paths:
      - 'data/**.dvc'
      - 'src/**.py'
      - 'params.yaml'
  workflow_dispatch:

jobs:

  # JOB 1: Chay unit tests tren du lieu ao (khong can GCS)
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt dvc-s3


      - name: Run tests
        run: pytest tests/ -v

  # JOB 2: Huan luyen mo hinh tren du lieu thuc, upload artifact len cloud storage
  train:
    name: Train
    needs: test              # Chi chay khi job test qua
    runs-on: ubuntu-latest
    outputs:
      accuracy: ${{ steps.read_metrics.outputs.accuracy }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt dvc-s3


      - name: Authenticate to AWS
        run: |
          mkdir -p ~/.aws
          echo "[default]" > ~/.aws/credentials
          echo "aws_access_key_id = ${{ secrets.AWS_ACCESS_KEY_ID }}" >> ~/.aws/credentials
          echo "aws_secret_access_key = ${{ secrets.AWS_SECRET_ACCESS_KEY }}" >> ~/.aws/credentials
          echo "AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}" >> $GITHUB_ENV
          echo "AWS_DEFAULT_REGION=ap-southeast-1" >> $GITHUB_ENV


      - name: Pull data with DVC
        run: dvc pull data/train_phase1.csv data/eval.csv

      - name: Train model
        run: python src/train.py

      - name: Read metrics
        id: read_metrics
        run: |
          ACC=$(python -c "import json; print(json.load(open('outputs/metrics.json'))['accuracy'])")
          echo "accuracy=$ACC" >> $GITHUB_OUTPUT

      - name: Upload model to S3
        run: |
          python - <<'EOF'
          import os
          import boto3
          
          bucket_name = "${{ secrets.CLOUD_BUCKET }}"
          source_file = "models/model.pkl"
          destination_key = "models/latest/model.pkl"
          
          s3 = boto3.client('s3')
          s3.upload_file(source_file, bucket_name, destination_key)
          print(f"Uploaded {source_file} to s3://{bucket_name}/{destination_key}")
          EOF

      - name: Save metrics and report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: performance-report
          path: |
            outputs/metrics.json
            outputs/report.txt

  # JOB 3: Kiem tra chat luong - chi cho phep deploy khi accuracy >= 0.70
  eval:
    name: Eval
    needs: train             # Chi chay khi job train qua
    runs-on: ubuntu-latest
    steps:
      - name: Check eval gate
        run: |
          python - <<'EOF'
          import sys
          accuracy = float("${{ needs.train.outputs.accuracy }}")
          print(f"Current Accuracy: {accuracy}")
          if accuracy < 0.70:
              print("Accuracy below threshold (0.70). Blocking deployment.")
              sys.exit(1)
          print("Accuracy threshold met. Proceeding to deployment.")
          EOF

  # JOB 4: Trien khai sau khi eval gate qua
  deploy:
    name: Deploy
    needs: eval              # Chi chay khi job eval qua
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            sudo systemctl restart mlops-serve
            sleep 5
            curl -f http://localhost:8000/health || exit 1
