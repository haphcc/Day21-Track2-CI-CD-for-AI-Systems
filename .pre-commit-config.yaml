repos:
- repo: https://github.com/treeverse/dvc
  rev: 3.67.1
  hooks:
  - id: dvc-pre-commit
    additional_dependencies: [dvc[s3]]
    language_version: python3
    stages: [pre-commit]
  - id: dvc-pre-push
    additional_dependencies: [dvc[s3]]
    language_version: python3
    stages: [pre-push]
  - id: dvc-post-checkout
    additional_dependencies: [dvc[s3]]
    language_version: python3
    stages: [post-checkout]
    always_run: true


